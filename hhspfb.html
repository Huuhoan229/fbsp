<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Affiliate Link</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #EE4D2D;
    --orange-dark: #D43F22;
    --green: #2DB84B;
    --green-dark: #25A040;
    --blue: #1877F2;
    --blue-dark: #1467D6;
    --bg: #F5F5F5;
    --card: #FFFFFF;
    --border: #E8E8E8;
    --text: #212121;
    --muted: #757575;
    --radius: 10px;
    --radius-lg: 14px;
  }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 12px 60px;
  }
  .container { width: 100%; max-width: 480px; }

  .top-bar {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 20px;
  }
  .top-bar .logo-icon {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--orange); display: flex; align-items: center; justify-content: center;
  }
  .top-bar .logo-icon svg { width: 22px; height: 22px; fill: white; }
  .top-bar h1 { font-size: 17px; font-weight: 700; color: var(--text); }

  .card {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 18px 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  }
  .input-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--text);
    margin-bottom: 10px;
  }
  .lock-icon { font-size: 14px; }

  .input-wrap {
    display: flex; align-items: center;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: #FAFAFA;
    transition: border-color 0.15s;
    overflow: hidden;
  }
  .input-wrap:focus-within { border-color: var(--orange); background: white; }
  .input-wrap input {
    flex: 1; border: none; background: transparent;
    padding: 11px 12px; font-size: 14px; color: var(--text);
    font-family: inherit; outline: none; min-width: 0;
  }
  .input-wrap input::placeholder { color: #BDBDBD; font-size: 13.5px; }
  .clear-btn {
    width: 36px; height: 40px; border: none; background: transparent;
    display: none; align-items: center; justify-content: center;
    cursor: pointer; color: #BDBDBD; font-size: 20px; flex-shrink: 0;
    line-height: 1;
  }
  .clear-btn.show { display: flex; }
  .clear-btn:hover { color: #999; }

  .err { font-size: 12px; color: var(--orange); margin-top: 7px; display: none; }
  .err.show { display: block; }

  .btn-main {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px;
    background: var(--orange); color: white;
    border: none; border-radius: var(--radius);
    font-family: inherit; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
    margin-top: 12px;
  }
  .btn-main:hover { background: var(--orange-dark); }
  .btn-main:active { transform: scale(0.99); }

  /* Result */
  .result-card {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    display: none;
  }
  .result-card.show { display: block; }

  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .result-label {
    display: flex; align-items: center; gap: 7px;
    font-size: 13.5px; font-weight: 600; color: var(--text);
  }
  .check-circle {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--green); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .check-circle svg { width: 11px; height: 11px; stroke: white; fill: none; stroke-width: 2.5; }

  .result-box {
    background: #FFF8F6; border: 1.5px solid #FECDBA;
    border-radius: var(--radius); padding: 10px 12px;
    margin-bottom: 14px;
  }
  .result-url {
    font-size: 12px; color: #555;
    font-family: 'Courier New', monospace;
    word-break: break-all; line-height: 1.7;
  }

  .copy-btn-main {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--orange); color: white;
    border: none; border-radius: 8px;
    padding: 7px 14px; font-family: inherit;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
    white-space: nowrap;
  }
  .copy-btn-main:hover { background: var(--orange-dark); }
  .copy-btn-main.copied { background: var(--green); }

  .action-row { display: flex; gap: 10px; }

  .btn-buy, .btn-share {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 12px; color: white; border: none; border-radius: var(--radius);
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s; text-decoration: none;
  }
  .btn-buy { background: var(--green); }
  .btn-buy:hover { background: var(--green-dark); }
  .btn-share { background: var(--blue); }
  .btn-share:hover { background: var(--blue-dark); }
  .btn-buy svg, .btn-share svg { width: 17px; height: 17px; fill: white; }

  /* FB post */
  .fb-post-card {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  }
  .fb-post-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: transparent; border: 1.5px solid var(--blue);
    border-radius: 8px; padding: 9px 16px;
    font-family: inherit; font-size: 13.5px; font-weight: 600;
    color: var(--blue); cursor: pointer; transition: background 0.15s;
  }
  .fb-post-btn:hover { background: #E6F1FB; }
  .fb-post-btn svg { width: 16px; height: 16px; fill: var(--blue); }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #222; color: white; padding: 10px 20px;
    border-radius: 24px; font-size: 13.5px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
    z-index: 9999; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32"><path d="M16 4C9.37 4 4 9.37 4 16s5.37 12 12 12 12-5.37 12-12S22.63 4 16 4zm0 5a3.5 3.5 0 110 7 3.5 3.5 0 010-7zm0 16.5a9.5 9.5 0 01-7.4-3.57C8.82 19.7 12.22 18.5 16 18.5s7.18 1.2 7.4 3.43A9.5 9.5 0 0116 25.5z"/></svg>
    </div>
    <h1>Shopee Affiliate Link</h1>
  </div>

  <div class="card">
    <div class="input-label">
      <span class="lock-icon">🔒</span>
      Link sản phẩm Shopee
    </div>
    <div class="input-wrap">
      <input type="text" id="inputLink" placeholder="Nhập link sản phẩm tại đây" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="clear-btn" id="clearBtn" onclick="clearInput()">×</button>
    </div>
    <div class="err" id="errMsg">Không nhận ra link Shopee hợp lệ. Vui lòng thử lại.</div>
    <button class="btn-main" onclick="convertLink()">
      ✏️&nbsp; Tạo Link Ngay
    </button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-label">
        <div class="check-circle">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        Link 1
      </div>
      <button class="copy-btn-main" id="copyBtn" onclick="copyLink()">
        📋&nbsp; Copy
      </button>
    </div>

    <div class="result-box">
      <div class="result-url" id="resultUrl"></div>
    </div>

    <div class="action-row">
      <button class="btn-buy" onclick="openBuy()">
        <svg viewBox="0 0 576 512"><path d="M0 24C0 10.7 10.7 0 24 0H69.5c22 0 41.5 12.8 50.6 32h411c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3H170.7l5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5H488c13.3 0 24 10.7 24 24s-10.7 24-24 24H199.7c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5H24C10.7 48 0 37.3 0 24zM128 464a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z"/></svg>
        Mua Ngay
      </button>
      <button class="btn-share" onclick="shareFB()">
        <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
        Chia sẻ
      </button>
    </div>
  </div>

  <div class="fb-post-card">
    <button class="fb-post-btn" onclick="openFBPost()">
      <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
      Đến bài đăng Facebook
    </button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
  const AFF_ID = '17359570151';
  const SUB_ID = 'addlivetag----';
  const BASE   = 'https://s.shopee.vn/an_redir';
  const FB_URL = 'https://www.facebook.com/photo/?fbid=894740917842290&set=pb.100066645295090.-2207520000';

  let currentAffLink = '';

  function parseShopeeLink(raw) {
    raw = raw.trim();
    if (raw.includes('an_redir')) {
      try {
        const u = new URL(raw);
        u.searchParams.set('affiliate_id', AFF_ID);
        u.searchParams.set('sub_id', SUB_ID);
        return u.toString();
      } catch(e) {}
    }
    const iMatch = raw.match(/[-/?&]i\.(\d+)\.(\d+)/);
    if (iMatch) {
      const origin = `https://shopee.vn/product/${iMatch[1]}/${iMatch[2]}`;
      return `${BASE}?origin_link=${encodeURIComponent(origin)}&affiliate_id=${AFF_ID}&sub_id=${SUB_ID}`;
    }
    const prodMatch = raw.match(/\/product\/(\d+)\/(\d+)/);
    if (prodMatch) {
      const origin = `https://shopee.vn/product/${prodMatch[1]}/${prodMatch[2]}`;
      return `${BASE}?origin_link=${encodeURIComponent(origin)}&affiliate_id=${AFF_ID}&sub_id=${SUB_ID}`;
    }
    if (raw.includes('shope.ee') || raw.includes('shopee.vn')) {
      return `${BASE}?origin_link=${encodeURIComponent(raw)}&affiliate_id=${AFF_ID}&sub_id=${SUB_ID}`;
    }
    return null;
  }

  function convertLink() {
    const raw = document.getElementById('inputLink').value.trim();
    const err = document.getElementById('errMsg');
    const card = document.getElementById('resultCard');
    if (!raw) {
      err.textContent = 'Vui lòng nhập link sản phẩm Shopee.';
      err.classList.add('show'); card.classList.remove('show'); return;
    }
    const result = parseShopeeLink(raw);
    if (!result) {
      err.textContent = 'Không nhận ra link Shopee hợp lệ. Vui lòng thử lại.';
      err.classList.add('show'); card.classList.remove('show'); return;
    }
    err.classList.remove('show');
    currentAffLink = result;
    document.getElementById('resultUrl').textContent = result;
    const copyBtn = document.getElementById('copyBtn');
    copyBtn.classList.remove('copied');
    copyBtn.textContent = '📋\u00a0 Copy';
    card.classList.add('show');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function copyLink() {
    if (!currentAffLink) return;
    navigator.clipboard.writeText(currentAffLink).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.textContent = '✓ Copied!';
      showToast('Đã copy link affiliate!');
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = '📋\u00a0 Copy';
      }, 2500);
    });
  }

  function openBuy() {
    if (currentAffLink) window.open(currentAffLink, '_blank');
  }

  function shareFB() {
    if (!currentAffLink) return;
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentAffLink)}`, '_blank');
  }

  function openFBPost() {
    window.open(FB_URL, '_blank');
  }

  function clearInput() {
    document.getElementById('inputLink').value = '';
    document.getElementById('clearBtn').classList.remove('show');
    document.getElementById('errMsg').classList.remove('show');
    document.getElementById('resultCard').classList.remove('show');
    currentAffLink = '';
    document.getElementById('inputLink').focus();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  const inp = document.getElementById('inputLink');
  inp.addEventListener('input', () => {
    document.getElementById('clearBtn').classList.toggle('show', inp.value.length > 0);
  });
  inp.addEventListener('paste', () => setTimeout(convertLink, 60));
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') convertLink(); });
</script>
</body>
</html>
