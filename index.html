<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shopee Link — Tạo link affiliate</title>
<meta name="description" content="Tạo link affiliate Shopee siêu nhanh">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange:    #FF5722;
  --orange-2:  #FF7043;
  --orange-dk: #BF360C;
  --cream:     #FFF8F5;
  --warm-lt:   rgba(255,87,34,0.08);
  --dark:      #1C0A00;
  --muted:     #A06848;
  --border:    rgba(255,255,255,0.09);
  --green:     #00C853;
  --blue:      #1877F2;
  --r:         13px;
  --r-lg:      20px;
}

body {
  font-family: 'Be Vietnam Pro', sans-serif;
  background: var(--dark);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 80px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 55% at 50% -5%, rgba(255,87,34,0.20) 0%, transparent 68%),
    radial-gradient(ellipse 45% 35% at 85% 85%, rgba(255,87,34,0.07) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.wrap {
  width: 100%; max-width: 450px;
  padding: 0 16px;
  position: relative; z-index: 1;
}

/* ── Hero ── */
.hero {
  padding: 48px 0 32px;
  text-align: center;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,87,34,0.12);
  border: 1px solid rgba(255,87,34,0.28);
  border-radius: 100px;
  padding: 5px 14px 5px 9px;
  font-size: 11px; font-weight: 700;
  color: var(--orange-2);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 20px;
}
.live-dot {
  width: 7px; height: 7px;
  background: var(--orange);
  border-radius: 50%;
  animation: livepulse 2s ease-in-out infinite;
}
@keyframes livepulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,87,34,0.7); }
  50%      { box-shadow: 0 0 0 5px rgba(255,87,34,0); }
}

.hero h1 {
  font-size: clamp(26px, 7vw, 36px);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.025em;
  color: var(--cream);
  margin-bottom: 10px;
}
.hero h1 .accent {
  background: linear-gradient(120deg, var(--orange) 0%, var(--orange-2) 50%, #FFAB76 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p { font-size: 13.5px; color: var(--muted); line-height: 1.6; }

/* ── Glass panel ── */
.glass {
  background: rgba(255,255,255,0.047);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 22px 20px;
  margin-bottom: 12px;
  position: relative; overflow: hidden;
}
.glass::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
  pointer-events: none;
}

/* ── Field label ── */
.lbl {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 7px;
}
.lbl-bar {
  display: inline-block; width: 3px; height: 12px;
  background: var(--orange); border-radius: 2px;
}

/* ── Input ── */
.input-shell {
  display: flex; align-items: center;
  background: rgba(0,0,0,0.22);
  border: 1.5px solid rgba(255,255,255,0.09);
  border-radius: var(--r);
  transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  overflow: hidden;
}
.input-shell:focus-within {
  border-color: var(--orange);
  background: rgba(255,87,34,0.07);
  box-shadow: 0 0 0 4px rgba(255,87,34,0.13);
}
.input-shell input {
  flex: 1; border: none; background: transparent;
  padding: 13px 14px; font-size: 14px; color: var(--cream);
  font-family: inherit; outline: none; min-width: 0;
}
.input-shell input::placeholder { color: rgba(255,255,255,0.22); font-size: 13px; }

.clear-btn {
  width: 40px; height: 46px; border: none; background: transparent;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(255,255,255,0.25); font-size: 20px; flex-shrink: 0;
  transition: color 0.15s;
}
.clear-btn.show { display: flex; }
.clear-btn:hover { color: rgba(255,255,255,0.55); }

.err-msg { font-size: 12px; color: var(--orange-2); margin-top: 8px; display: none; }
.err-msg.show { display: block; }

/* ── Generate button ── */
.btn-gen {
  width: 100%; margin-top: 14px; padding: 15px;
  background: linear-gradient(135deg, var(--orange) 0%, #FF6D3A 100%);
  color: white; border: none; border-radius: var(--r);
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.01em;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  position: relative; overflow: hidden;
  transition: opacity 0.18s, transform 0.12s, box-shadow 0.18s;
  box-shadow: 0 5px 22px rgba(255,87,34,0.38), inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-gen::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.13) 0%, transparent 55%);
  pointer-events: none;
}
.btn-gen:hover  { opacity: 0.91; transform: translateY(-1px); box-shadow: 0 9px 30px rgba(255,87,34,0.46); }
.btn-gen:active { transform: scale(0.98); }
.btn-gen:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-icon { font-size: 16px; transition: transform 0.2s; }
.btn-gen:not(:disabled):hover .btn-icon { transform: rotate(20deg); }

.spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,0.28); border-top-color: white;
  border-radius: 50%; animation: spin 0.65s linear infinite; display: none;
}
.spinner.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Result ── */
.result-wrap { display: none; margin-bottom: 12px; }
.result-wrap.show {
  display: block;
  animation: popIn 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn {
  from { opacity: 0; transform: translateY(14px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.result-card {
  background: linear-gradient(145deg, rgba(255,87,34,0.13), rgba(255,255,255,0.04));
  border: 1px solid rgba(255,87,34,0.28);
  border-radius: var(--r-lg);
  padding: 20px 18px;
  position: relative; overflow: hidden;
}
.result-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,130,80,0.5), transparent);
  pointer-events: none;
}

.result-top {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 13px;
}
.result-lbl {
  display: flex; align-items: center; gap: 9px;
  font-size: 13px; font-weight: 700; color: var(--cream);
}
.check-ring {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 12px rgba(0,200,83,0.45);
}
.check-ring svg { width: 12px; height: 12px; stroke: white; fill: none; stroke-width: 2.5; }

.copy-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  background: var(--orange); color: white;
  border: none; border-radius: 8px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 3px 12px rgba(255,87,34,0.32);
}
.copy-btn:hover  { background: var(--orange-dk); transform: translateY(-1px); }
.copy-btn:active { transform: scale(0.97); }
.copy-btn.copied { background: var(--green); box-shadow: 0 3px 12px rgba(0,200,83,0.32); }

.link-display {
  background: rgba(0,0,0,0.28);
  border: 1px solid rgba(255,87,34,0.18);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 16px;
  word-break: break-all;
  font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
  font-size: 11.5px; color: rgba(255,190,160,0.88); line-height: 1.8;
}

.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-act {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 10px;
  border: none; border-radius: var(--r);
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; color: white; letter-spacing: 0.01em;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-act:active { transform: scale(0.97); }
.btn-act svg { width: 16px; height: 16px; fill: white; flex-shrink: 0; }
.btn-buy   { background: var(--green);  box-shadow: 0 3px 14px rgba(0,200,83,0.28); }
.btn-buy:hover   { opacity: 0.87; }
.btn-share { background: var(--blue);   box-shadow: 0 3px 14px rgba(24,119,242,0.28); }
.btn-share:hover { opacity: 0.87; }

/* ── Divider ── */
.divider {
  width: 100%; border: none;
  border-top: 1px dashed rgba(255,255,255,0.07);
  margin: 6px 0 12px;
}

/* ── Guide ── */
.guide {
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--r-lg);
  padding: 20px 18px;
  margin-bottom: 12px;
}
.guide-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px;
  display: flex; align-items: center; gap: 7px;
}
.guide-title .lbl-bar { background: var(--muted); }

.steps { display: flex; flex-direction: column; gap: 13px; margin-bottom: 18px; }
.step  { display: flex; align-items: flex-start; gap: 12px; }
.step-num {
  width: 24px; height: 24px; border-radius: 8px;
  background: rgba(255,87,34,0.13); border: 1px solid rgba(255,87,34,0.22);
  color: var(--orange-2); font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.step p { font-size: 13.5px; color: rgba(255,255,255,0.6); line-height: 1.55; }
.step strong { color: var(--cream); font-weight: 600; }

.btn-fb {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  background: rgba(24,119,242,0.10); border: 1px solid rgba(24,119,242,0.28);
  border-radius: 10px; font-family: inherit; font-size: 13.5px; font-weight: 600;
  color: #7FB3F8; cursor: pointer; transition: background 0.15s;
  margin-bottom: 14px;
}
.btn-fb:hover { background: rgba(24,119,242,0.18); }
.btn-fb svg { width: 16px; height: 16px; fill: #7FB3F8; flex-shrink: 0; }

.guide-img { width: 100%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.07); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: rgba(20,8,0,0.96); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,87,34,0.28);
  color: var(--cream); padding: 11px 22px; border-radius: 100px;
  font-size: 13.5px; font-weight: 500;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 9999; white-space: nowrap;
  box-shadow: 0 8px 30px rgba(0,0,0,0.45);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 380px) {
  .hero h1 { font-size: 24px; }
  .action-row { grid-template-columns: 1fr; }
  .glass, .result-card, .guide { padding: 16px 14px; }
}
</style>
</head>
<body>

  <div class="hero">

  <!-- Input -->
  <div class="glass">

    <div class="input-shell">
      <input type="text" id="inputLink"
        placeholder="shopee.vn/... hoặc s.shopee.vn/..."

        </div>

          <svg width="13" height="13" fill="white" viewBox="0 0 24 24"><path d="M8 4v12a2 2 0 002 2h8a2 2 0 002-2V7.2a2 2 0 00-.6-1.4L16.1 2.6A2 2 0 0014.7 2H10a2 2 0 00-2 2z"/><path d="M16 18v2a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2"/></svg>

        </button>
      </div>
      <div class="link-display" id="resultUrl"></div>
      <div class="action-row">
        <button class="btn-act btn-buy" onclick="openBuy()">
          <svg viewBox="0 0 576 512"><path d="M0 24C0 10.7 10.7 0 24 0H69.5c22 0 41.5 12.8 50.6 32h411c26.3 0 45.5 25 38.6 50.4l-41 152.3c-8.5 31.4-37 53.3-69.5 53.3H170.7l5.4 28.5c2.2 11.3 12.1 19.5 23.6 19.5H488c13.3 0 24 10.7 24 24s-10.7 24-24 24H199.7c-34.6 0-64.3-24.6-70.7-58.5L77.4 54.5c-.7-3.8-4-6.5-7.9-6.5H24C10.7 48 0 37.3 0 24zm128 440a48 48 0 1 1 96 0 48 48 0 1 1-96 0zm336-48a48 48 0 1 1 0 96 48 48 0 1 1 0-96z"/></svg>

        </button>

          <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
          Chia sẻ FB
        </button>

  </div>

  <hr class="divider">

  <!-- Guide -->
  <div class="guide">
    <div class="guide-title"><span class="lbl-bar"></span>Hướng dẫn</div>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <p>Sau khi tạo link, nhấn <strong>Copy Link</strong>.</p>

      <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════
// CẤU HÌNH
// ═══════════════════════════════════
const AFF_ID     = '17359570151';
const SUB_ID     = 'addlivetag----';
const BASE       = 'https://s.shopee.vn/an_redir';
const FB_URL     = 'https://www.facebook.com/groups/1297082825811036/permalink/1297082939144358/#';

// Sau khi deploy worker.js → thay URL này
const WORKER_URL = 'https://shopee-resolver.YOUR-SUBDOMAIN.workers.dev';
// ═══════════════════════════════════

let currentAffLink = '';

function buildAffLink(shopId, itemId) {
  return `${BASE}?origin_link=${encodeURIComponent(`https://shopee.vn/product/${shopId}/${itemId}`)}&affiliate_id=${AFF_ID}&sub_id=${SUB_ID}`;
}

function extractIds(url) {
  let m = url.match(/\/product\/(\d+)\/(\d+)/);
  if (m) return buildAffLink(m[1], m[2]);
  m = url.match(/[-/?&]i\.(\d+)\.(\d+)/);
  if (m) return buildAffLink(m[1], m[2]);
  if (url.includes('shopee.vn'))
    return `${BASE}?origin_link=${encodeURIComponent(url)}&affiliate_id=${AFF_ID}&sub_id=${SUB_ID}`;
  return null;
}

async function resolveShortLink(shortUrl) {
  const res = await fetch(`${WORKER_URL}?url=${encodeURIComponent(shortUrl)}`);
  if (!res.ok) throw new Error('Worker ' + res.status);
  const d = await res.json();
  if (!d.resolved) throw new Error('No resolved URL');
  return d.resolved;
}

async function parseShopeeLink(raw) {
  raw = raw.trim();
  if (raw.includes('an_redir')) {
    try {
      const u = new URL(raw);
      u.searchParams.set('affiliate_id', AFF_ID);
      u.searchParams.set('sub_id', SUB_ID);
      return u.toString();
    } catch(e) {}
  }
  if (raw.includes('s.shopee.vn') || raw.includes('shope.ee')) {
    const resolved = await resolveShortLink(raw);
    return extractIds(resolved);
  }
  if (raw.includes('shopee.vn')) return extractIds(raw);
  return null;
}

async function convertLink() {
  const raw  = document.getElementById('inputLink').value.trim();
  const err  = document.getElementById('errMsg');
  const wrap = document.getElementById('resultWrap');
  err.classList.remove('show');
  if (!raw) {
    err.textContent = 'Vui lòng nhập link sản phẩm Shopee.';
    err.classList.add('show'); return;
  }
  setLoading(true); wrap.classList.remove('show');
  try {
    const result = await parseShopeeLink(raw);
    if (!result) {
      err.textContent = 'Không nhận ra link Shopee hợp lệ. Vui lòng thử lại.';
      err.classList.add('show'); return;
    }
    currentAffLink = result;
    document.getElementById('resultUrl').textContent = result;
    resetCopyBtn();
    wrap.classList.add('show');
    setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
  } catch(e) {
    err.textContent = 'Lỗi kết nối. Thử lại hoặc dùng link đầy đủ shopee.vn.';
    err.classList.add('show');
  } finally { setLoading(false); }
}

function setLoading(on) {
  const btn = document.getElementById('btnGen');
  document.getElementById('btnText').textContent = on ? 'Đang xử lý...' : 'Tạo Link Ngay';
  document.getElementById('spinner').classList.toggle('show', on);
  document.querySelector('.btn-icon').style.display = on ? 'none' : '';
  btn.disabled = on;
}

function resetCopyBtn() {
  const b = document.getElementById('copyBtn');
  b.classList.remove('copied');
  b.innerHTML = `<svg width="13" height="13" fill="white" viewBox="0 0 24 24"><path d="M8 4v12a2 2 0 002 2h8a2 2 0 002-2V7.2a2 2 0 00-.6-1.4L16.1 2.6A2 2 0 0014.7 2H10a2 2 0 00-2 2z"/><path d="M16 18v2a2 2 0 01-2 2H6a2 2 0 01-2-2V9a2 2 0 012-2h2"/></svg> Copy Link`;
}

function copyLink() {
  if (!currentAffLink) return;
  const done = () => {
    const b = document.getElementById('copyBtn');
    b.classList.add('copied'); b.textContent = '✓  Đã copy!';
    showToast('Đã copy link affiliate!');
    setTimeout(resetCopyBtn, 2500);
  };
  navigator.clipboard
    ? navigator.clipboard.writeText(currentAffLink).then(done).catch(() => fallback(done))
    : fallback(done);
}
function fallback(cb) {
  const t = Object.assign(document.createElement('textarea'), { value: currentAffLink });
  t.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(t); t.focus(); t.select();
  try { document.execCommand('copy'); cb(); } catch(e){}
  document.body.removeChild(t);
}

function openBuy()    { if (currentAffLink) window.open(currentAffLink, '_blank'); }
function shareFB()    { if (!currentAffLink) return; window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentAffLink)}`, '_blank'); }
function openFBPost() { window.open(FB_URL, '_blank'); }
function clearInput() {
  document.getElementById('inputLink').value = '';
  document.getElementById('clearBtn').classList.remove('show');
  document.getElementById('errMsg').classList.remove('show');
  document.getElementById('resultWrap').classList.remove('show');
  currentAffLink = '';
  document.getElementById('inputLink').focus();
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

const inp = document.getElementById('inputLink');
inp.addEventListener('input', () => document.getElementById('clearBtn').classList.toggle('show', !!inp.value));
inp.addEventListener('paste', () => setTimeout(convertLink, 80));
inp.addEventListener('keydown', e => e.key === 'Enter' && convertLink());
</script>
</body>
